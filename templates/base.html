<!doctype html>
    <html lang="en">
      <head>
          <meta charset="utf-8">
          <link rel="stylesheet" type="text/css" href="/static/css/style.css" />
          <link rel="stylesheet"
                        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
                        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
                        crossorigin="anonymous">
          <title>{{ title }}</title>
      </head>
      <body>
        <nav class="navbar navbar-light bg-light">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">Миссия Колонизация Марса</span>
                <a class="navbar-brand">Mars One</a>
                {% if current_user.is_authenticated %}
                    <a class="navbar-brand" href="/logout">{{ current_user.surname }} {{ current_user.name }}</a>
                    <a href="/add_job" class="btn btn-secondary">Добавить новость</a>
                {% else %}
                    <p>
                        <a class="btn btn-primary " href="/register">Зарегистрироваться</a>
                        <a class="btn btn-success" href="/auth">Войти</a>
                    </p>
                {% endif %}
            </div>
        </nav>
        <h4>И на Марсе будут яблони цвести!</h4>
        {% block content %}{% endblock %}
      </body>
    </html>
